<div class="search-bar">
  <div class="search-input-wrapper">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      type="text"
      class="search-input"
      placeholder="Search products..."
      [value]="searchTerm()"
      (input)="onInput($any($event.target).value)"
    />
    @if (searchTerm()) {
      <button class="clear-btn" (click)="onClear()" type="button" aria-label="Clear search">&times;</button>
    }
  </div>
</div>
