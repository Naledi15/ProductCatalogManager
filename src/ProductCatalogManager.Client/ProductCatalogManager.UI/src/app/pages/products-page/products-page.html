@let categories = (categories$ | async) ?? [];

<div class="page">
  <div class="page-header">
    <div>
      <h1>Products</h1>
      <p class="page-subtitle">Manage your product catalog</p>
    </div>
    <a routerLink="/products/new" class="btn-add">+ Add Product</a>
  </div>

  <div class="filters">
    <div class="search-wrapper">
      <app-search-bar (search)="onSearch($event)" />
    </div>
    <div class="filter-wrapper">
      <app-category-filter
        [categories]="categories"
        [selectedId]="selectedCategoryId$ | async"
        (categoryChange)="onCategoryChange($event)"
      />
    </div>
    <div class="sort-wrapper">
      <select class="sort-select" [value]="selectedDropdownValue" (change)="onSortChange($any($event.target).value)">
        <optgroup label="Sort by">
          @for (opt of sortOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </optgroup>
        <optgroup label="Stock">
          @for (opt of stockOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </optgroup>
      </select>
    </div>
  </div>

  <app-product-list
    [products]="(displayProducts$ | async) ?? []"
    [categories]="categories"
    [loading]="(loading$ | async) ?? true"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
  />

  @let totalPages = (totalPages$ | async) ?? 0;
  @let currentPage = (currentPage$ | async) ?? 1;

  @if (totalPages > 1) {
    <div class="pagination">
      <button class="pagination-btn" (click)="onPageChange(currentPage - 1)" [disabled]="currentPage <= 1">
        &lsaquo; Prev
      </button>
      <span class="pagination-info">Page {{ currentPage }} of {{ totalPages }}</span>
      <button class="pagination-btn" (click)="onPageChange(currentPage + 1)" [disabled]="currentPage >= totalPages">
        Next &rsaquo;
      </button>
    </div>
  }
</div>
